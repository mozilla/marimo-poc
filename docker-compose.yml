services:
  marimo:
    build: .
    ports:
      - "2718:2718"
    volumes:
      - ./notebooks:/home/user/notebooks
      - ~/.config/gcloud:/root/.config/gcloud:ro
    environment:
      - GOOGLE_CLOUD_PROJECT=${GOOGLE_CLOUD_PROJECT}
    command: marimo edit --host 0.0.0.0 --port 2718 --no-token
